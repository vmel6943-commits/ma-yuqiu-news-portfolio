<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贵州红色文化互动页</title>
    <style>
      :root {
        --red: #8f1f24;
        --deep: #20110f;
        --paper: #f4ead6;
        --gold: #d2a54d;
        --green: #203f2a;
        --muted: #7c6a55;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--deep);
        background: var(--paper);
        font-family: "Noto Serif SC", "Songti SC", SimSun, serif;
      }
      .page {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(260px, 0.42fr) minmax(0, 0.58fr);
      }
      .left {
        min-height: 100vh;
        padding: 44px;
        color: #fff7e8;
        background:
          linear-gradient(rgba(32, 17, 15, 0.5), rgba(32, 17, 15, 0.88)),
          url("./images/first.png") center/cover;
      }
      .kicker {
        margin: 0 0 14px;
        color: var(--gold);
        font: 800 12px/1.2 "Microsoft YaHei", sans-serif;
      }
      h1 {
        margin: 0;
        font-size: clamp(46px, 8vw, 92px);
        line-height: 0.98;
      }
      .left p {
        max-width: 520px;
        color: rgba(255, 247, 232, 0.82);
        font-size: 18px;
        line-height: 1.9;
      }
      .right {
        padding: 34px;
      }
      .tabs {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 18px;
      }
      button {
        min-height: 42px;
        border: 1px solid rgba(32, 17, 15, 0.24);
        border-radius: 4px;
        background: #fff9ed;
        color: var(--deep);
        cursor: pointer;
        font-weight: 800;
      }
      button.active {
        color: #fff7e8;
        background: var(--red);
        border-color: var(--red);
      }
      .panel {
        display: grid;
        grid-template-columns: 0.55fr 0.45fr;
        gap: 20px;
        min-height: 460px;
        padding: 18px;
        border: 2px solid var(--deep);
        border-radius: 8px;
        background: #fff9ed;
      }
      .visual {
        overflow: hidden;
        border-radius: 6px;
        background: #e7d8ba;
      }
      .visual img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .copy h2 {
        margin: 0;
        color: var(--red);
        font-size: clamp(28px, 4vw, 50px);
        line-height: 1.12;
      }
      .copy p,
      .copy li {
        color: var(--muted);
        line-height: 1.8;
      }
      .mission {
        margin-top: 18px;
        padding: 16px;
        border-left: 5px solid var(--gold);
        background: #f4ead6;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 16px;
      }
      .cards img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border: 1px solid rgba(32, 17, 15, 0.22);
        border-radius: 6px;
      }
      @media (max-width: 860px) {
        .page,
        .panel {
          grid-template-columns: 1fr;
        }
        .left {
          min-height: auto;
          padding: 30px 22px;
        }
        .right {
          padding: 20px;
        }
        .tabs {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="left">
        <p class="kicker">GUIZHOU RED CULTURE / INTERACTIVE PROTOTYPE</p>
        <h1>红色贵州<br />青年表达路线</h1>
        <p>
          这是一个面向作品集展示的互动小页：用路线选择的方式，把红色文化资源转化为可策划、可拍摄、可传播的新媒体选题。
        </p>
      </section>
      <section class="right">
        <div class="tabs" id="tabs"></div>
        <article class="panel">
          <div class="visual"><img id="main-img" src="./images/BA.png" alt="路线视觉" /></div>
          <div class="copy">
            <p class="kicker" id="kicker">ROUTE 01</p>
            <h2 id="title">从历史现场进入青年叙事</h2>
            <p id="body"></p>
            <div class="mission">
              <strong>传播任务</strong>
              <ul id="tasks"></ul>
            </div>
            <div class="cards">
              <img src="./images/GT.png" alt="补充素材" />
              <img src="./images/horse.png" alt="补充素材" />
              <img src="./images/yangjiayu.png" alt="补充素材" />
            </div>
          </div>
        </article>
      </section>
    </main>
    <script>
      const routes = [
        {
          tab: "遵义",
          img: "./images/BA.png",
          kicker: "ROUTE 01",
          title: "从历史现场进入青年叙事",
          body: "以遵义会议相关红色文化资源为叙事起点，重点不是复述历史，而是设计青年可进入、可理解、可转述的新闻表达角度。",
          tasks: ["做一条60秒短视频脚本", "设计一张竖屏封面", "设置一个互动问题：今天的选择意味着什么？"]
        },
        {
          tab: "赤水",
          img: "./images/horse.png",
          kicker: "ROUTE 02",
          title: "把路线变成镜头调度",
          body: "用“行进路线”的方式组织画面，把地理移动、历史节点和人物选择合并成适合移动端浏览的叙事节奏。",
          tasks: ["以地图感组织分镜", "用动词做小标题", "让观众在节点间做选择"]
        },
        {
          tab: "村寨",
          img: "./images/GT.png",
          kicker: "ROUTE 03",
          title: "连接红色文化与乡村振兴",
          body: "把红色文化放回今天的乡村生活中观察，关注文旅、青年返乡、村级传播和地方公共叙事的变化。",
          tasks: ["采访一个地方讲述者", "拍摄一个生活化场景", "把红色资源转化为当代议题"]
        },
        {
          tab: "青年",
          img: "./images/yangjiayu.png",
          kicker: "ROUTE 04",
          title: "形成可发布的新媒体产品",
          body: "最终产出不是材料堆叠，而是一组可发布作品：短视频、封面、H5互动页与评论式导语共同构成传播组合。",
          tasks: ["写一句评论式导语", "生成互动H5结尾选择", "形成跨平台发布清单"]
        }
      ];
      const tabs = document.getElementById("tabs");
      const title = document.getElementById("title");
      const body = document.getElementById("body");
      const kicker = document.getElementById("kicker");
      const img = document.getElementById("main-img");
      const tasks = document.getElementById("tasks");
      function render(index) {
        const item = routes[index];
        [...tabs.children].forEach((button, i) => button.classList.toggle("active", i === index));
        title.textContent = item.title;
        body.textContent = item.body;
        kicker.textContent = item.kicker;
        img.src = item.img;
        tasks.innerHTML = item.tasks.map((task) => `<li>${task}</li>`).join("");
      }
      routes.forEach((route, index) => {
        const button = document.createElement("button");
        button.textContent = route.tab;
        button.addEventListener("click", () => render(index));
        tabs.appendChild(button);
      });
      render(0);
    </script>
  </body>
</html>
